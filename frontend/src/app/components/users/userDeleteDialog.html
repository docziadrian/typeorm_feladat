<h2 mat-dialog-title>Delete user</h2>
<mat-dialog-content>
  Would you like to delete this user?
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="closeDialog('no')">No</button>
  <button mat-button cdkFocusInitial (click)="closeDialog('yes')">Yes</button>
</mat-dialog-actions>
