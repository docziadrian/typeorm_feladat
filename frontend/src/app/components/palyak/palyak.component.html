<div class="team-container">
  <mat-card class="team-form-card">
    <mat-card-header>
      <mat-card-title>{{
        isEditMode ? "Pálya Módosítása" : "Új Pálya"
      }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="palyaForm" (ngSubmit)="onSubmit()" class="team-form">
        <mat-form-field appearance="fill">
          <mat-label>Név</mat-label>
          <input matInput formControlName="name" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Ország</mat-label>
          <input matInput formControlName="country" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Város</mat-label>
          <input matInput formControlName="city" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Hossz (km)</mat-label>
          <input
            matInput
            type="number"
            step="0.001"
            formControlName="lengthKm"
            required
          />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Pályarekord</mat-label>
          <input matInput formControlName="lapRecord" required />
        </mat-form-field>
        <div class="form-actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="palyaForm.invalid"
          >
            {{ isEditMode ? "Mentés" : "Hozzáadás" }}
          </button>
          <button
            mat-button
            type="button"
            (click)="resetForm()"
            *ngIf="isEditMode"
          >
            Mégse
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="team-list-card">
    <mat-card-header>
      <mat-card-title>Pályák Listája</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table
        mat-table
        [dataSource]="palyak"
        class="mat-elevation-z8 team-table"
      >
        <ng-container matColumnDef="index">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Név</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <ng-container matColumnDef="country">
          <th mat-header-cell *matHeaderCellDef>Ország</th>
          <td mat-cell *matCellDef="let element">{{ element.country }}</td>
        </ng-container>

        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef>Város</th>
          <td mat-cell *matCellDef="let element">{{ element.city }}</td>
        </ng-container>

        <ng-container matColumnDef="lengthKm">
          <th mat-header-cell *matHeaderCellDef>Hossz (km)</th>
          <td mat-cell *matCellDef="let element">{{ element.lengthKm }}</td>
        </ng-container>

        <ng-container matColumnDef="lapRecord">
          <th mat-header-cell *matHeaderCellDef>Pályarekord</th>
          <td mat-cell *matCellDef="let element">{{ element.lapRecord }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-header">
            Műveletek
          </th>
          <td mat-cell *matCellDef="let element" class="actions-cell">
            <button
              mat-flat-button
              class="edit-button"
              (click)="editPalya(element)"
            >
              Szerk.
            </button>
            <button
              mat-flat-button
              color="warn"
              class="delete-button"
              (click)="deletePalya(element.id)"
            >
              Törlés
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      <mat-paginator
        [pageSizeOptions]="[5, 10, 25]"
        [pageSize]="10"
        showFirstLastButtons
      ></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
