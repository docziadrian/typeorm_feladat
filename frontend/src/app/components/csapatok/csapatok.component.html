<div class="team-container">
  <mat-card class="team-form-card">
    <mat-card-header>
      <mat-card-title>{{
        isEditMode ? "Csapat Módosítása" : "Új Csapat Hozzáadása"
      }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="csapatForm" (ngSubmit)="onSubmit()" class="team-form">
        <mat-form-field appearance="fill">
          <mat-label>Név</mat-label>
          <input matInput formControlName="name" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Bázis</mat-label>
          <input matInput formControlName="base" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Csapatfőnök</mat-label>
          <input matInput formControlName="principal" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Erőforrás</mat-label>
          <input matInput formControlName="powerUnit" required />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Szín</mat-label>
          <input matInput formControlName="color" required />
        </mat-form-field>
        <div class="form-actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="csapatForm.invalid"
          >
            {{ isEditMode ? "Mentés" : "Hozzáadás" }}
          </button>
          <button
            mat-button
            type="button"
            (click)="resetForm()"
            *ngIf="isEditMode"
          >
            Mégse
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="team-list-card">
    <mat-card-header>
      <mat-card-title>Csapatok Listája</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table
        mat-table
        [dataSource]="csapatok"
        class="mat-elevation-z8 team-table"
      >
        <ng-container matColumnDef="index">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Név</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <ng-container matColumnDef="base">
          <th mat-header-cell *matHeaderCellDef>Bázis</th>
          <td mat-cell *matCellDef="let element">{{ element.base }}</td>
        </ng-container>

        <ng-container matColumnDef="principal">
          <th mat-header-cell *matHeaderCellDef>Csapatfőnök</th>
          <td mat-cell *matCellDef="let element">{{ element.principal }}</td>
        </ng-container>

        <ng-container matColumnDef="powerUnit">
          <th mat-header-cell *matHeaderCellDef>Erőforrás</th>
          <td mat-cell *matCellDef="let element">{{ element.powerUnit }}</td>
        </ng-container>

        <ng-container matColumnDef="color">
          <th mat-header-cell *matHeaderCellDef>Szín</th>
          <td mat-cell *matCellDef="let element">
            <div
              class="color-box"
              [style.backgroundColor]="element.color"
            ></div>
            {{ element.color }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-header">
            Műveletek
          </th>
          <td mat-cell *matCellDef="let element" class="actions-cell">
            <button
              mat-flat-button
              class="edit-button"
              (click)="editCsapat(element)"
            >
              Szerk.
            </button>
            <button
              mat-flat-button
              color="warn"
              class="delete-button"
              (click)="deleteCsapat(element.id)"
            >
              Törlés
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      <mat-paginator
        [pageSizeOptions]="[5, 10, 25]"
        [pageSize]="10"
        showFirstLastButtons
      ></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
